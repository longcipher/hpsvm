name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Lint Test Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-machete,typos-cli,rumdl,leptosfmt

      - name: Install cargo-sort
        run: cargo install cargo-sort

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v4.0.0-rc.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="$GITHUB_PATH:$PATH"

      - name: Build test programs
        run: cd crates/hpsvm/test_programs && cargo build-sbf

      - name: Run tests
        run: cargo test --features precompiles
        env:
          RUST_BACKTRACE: 1

      - name: Run SPL tests
        run: cd crates/token && cargo test --features token-2022
        env:
          RUST_BACKTRACE: 1

      - name: CI
        run: just ci

